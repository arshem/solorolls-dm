name: Firmware

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO + esptool
        run: pip install platformio esptool

      - name: Build firmware
        run: cd firmware && pio run

      - name: Upload merged binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware-merged
          path: firmware/.pio/build/ailite/firmware-merged.bin
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: firmware-merged

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: firmware-merged.bin
          generate_release_notes: true
