<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no" />
    <title>SoloRolls DM</title>
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>

    <!-- Login screen -->
    <div id="loginScreen" class="screen">
      <div class="login-container">
        <img src="/solorolls.png" alt="SoloRolls DM" class="login-logo" />
        <h1>SoloRolls DM</h1>
        <div class="login-form">
          <input type="password" id="apikey" placeholder="Enter your API key" autocomplete="off" />
          <button class="btn-primary" onclick="login()">Connect</button>
        </div>
        <div class="hint" id="whoami"></div>
      </div>
    </div>

    <!-- Main chat screen -->
    <div id="chatScreen" class="screen hidden">
      <!-- Top bar -->
      <header class="topbar">
        <div class="topbar-left">
          <img src="/solorolls.png" alt="" class="topbar-logo" />
          <span class="topbar-title">SoloRolls DM</span>
        </div>
        <div class="topbar-right">
          <button class="icon-btn" onclick="openSettings()" title="Settings" aria-label="Settings">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
          </button>
        </div>
      </header>

      <!-- Chat messages -->
      <div id="chat" class="chat-area"></div>

      <!-- Status indicator -->
      <div id="status" class="status-bar"></div>

      <!-- Mic button (floating) -->
      <div class="mic-container">
        <button id="recBtn" class="mic-btn" onclick="toggleRec()" disabled title="Hold to talk" aria-label="Record voice">
          <svg class="mic-icon" width="32" height="32" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
            <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z"/>
          </svg>
        </button>
        <div class="mic-ring"></div>
      </div>

      <!-- Bottom actions -->
      <div class="bottom-actions">
        <button class="action-btn" onclick="downloadGame()" title="Download transcript">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span>Save</span>
        </button>
        <button class="action-btn danger" onclick="newGame()" title="Start new game">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
          <span>New Game</span>
        </button>
      </div>
    </div>

    <!-- Settings modal -->
    <div id="settingsModal" class="modal hidden">
      <div class="modal-backdrop" onclick="closeSettings()"></div>
      <div class="modal-content">
        <div class="modal-header">
          <h2>Settings</h2>
          <button class="icon-btn" onclick="closeSettings()" aria-label="Close">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
          </button>
        </div>
        <div class="modal-body">
          <div class="settings-section">
            <h3>Character</h3>
            <label for="name">Assistant Name</label>
            <input id="name" placeholder="e.g. Johnny Silverhand" />
            <label for="personality">Personality</label>
            <textarea id="personality" rows="3" placeholder="Describe the DM personality..."></textarea>
            <label for="voice">Voice</label>
            <input id="voice" placeholder="e.g. Kore, Puck, Charon, Fenrir, Aoede" />
            <button class="btn-primary" onclick="saveConfig()" style="margin-top: 0.75rem">Save Config</button>
            <span class="flash" id="cfgFlash">Saved</span>
          </div>

          <div id="adminSettings" class="settings-section hidden">
            <h3>Admin — Users</h3>
            <details>
              <summary>Create new user</summary>
              <div style="margin-top: 0.5rem">
                <label>Name</label>
                <input type="text" id="newName" placeholder="Player name" />
                <button class="btn-primary sm" onclick="createUser()" style="margin-top: 0.5rem">Create</button>
                <div id="newKeyBox" class="hidden" style="margin-top: 0.6rem">
                  <div class="hint">Key (shown once — copy now):</div>
                  <div class="key-val" id="newKeyVal"></div>
                </div>
              </div>
            </details>
            <table>
              <thead><tr><th>Name</th><th>Key</th><th></th></tr></thead>
              <tbody id="userTable"></tbody>
            </table>
          </div>

          <div class="settings-section">
            <button class="btn-danger" onclick="logout()">Logout</button>
          </div>
        </div>
      </div>
    </div>

    <script src="/index.js?v=9"></script>
  </body>
</html>
