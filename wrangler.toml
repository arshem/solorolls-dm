name = "ailite"
main = "worker/src/index.js"
compatibility_date = "2024-11-01"

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "CONFIG"
id = "783f27ea6b424502b92eba670314d75f"
remote=true

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = false
persist = true
head_sampling_rate = 1
